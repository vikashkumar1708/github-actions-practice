name: matrix strategy
on:
    workflow_dispatch:
jobs:
    matrix_strategy:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
                python-version: ["3.10","3.11","3.12"]

        steps:
            - name: setup python
              uses: actions/setup-python@v5
              with:
                python-version: ${{matrix.python-version}}

            - name: print python version
              run: python --version
